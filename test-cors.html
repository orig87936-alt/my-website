<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>CORS & Translation API Test</h1>
    
    <div>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <button onclick="testTranslation()">Test Translation (需要登录)</button>
        <button onclick="testLogin()">Test Login</button>
    </div>

    <div>
        <h3>Token:</h3>
        <input type="text" id="token" style="width: 100%; padding: 8px;" placeholder="Paste token here">
    </div>

    <div id="result"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const resultDiv = document.getElementById('result');

        function log(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            resultDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }

        async function testHealth() {
            resultDiv.innerHTML = '';
            log('Testing health endpoint...');
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                log(`✅ Health check successful: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                log(`❌ Health check failed: ${error.message}`, true);
            }
        }

        async function testLogin() {
            resultDiv.innerHTML = '';
            log('Testing login...');
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                log(`✅ Login successful!`);
                log(`Token: ${data.access_token}`);
                
                // Auto-fill token
                document.getElementById('token').value = data.access_token;
            } catch (error) {
                log(`❌ Login failed: ${error.message}`, true);
            }
        }

        async function testTranslation() {
            resultDiv.innerHTML = '';
            const token = document.getElementById('token').value;
            
            if (!token) {
                log('❌ Please login first or paste a token', true);
                return;
            }

            log('Testing translation endpoint...');
            log(`Using token: ${token.substring(0, 20)}...`);
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/translation/translate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        text: '测试',
                        target_lang: 'en'
                    })
                });

                log(`Response status: ${response.status} ${response.statusText}`);
                log(`Response headers: ${JSON.stringify([...response.headers.entries()], null, 2)}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                log(`✅ Translation successful: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                log(`❌ Translation failed: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
