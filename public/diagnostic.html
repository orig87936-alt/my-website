<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约系统诊断工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .test-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .result.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .status-badge.success {
            background: #28a745;
            color: white;
        }
        
        .status-badge.error {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 预约系统诊断工具</h1>
        <p class="subtitle">用于诊断预约功能的问题</p>
        
        <!-- Test 1: API Configuration -->
        <div class="test-section">
            <h2>1️⃣ API 配置检查</h2>
            <button onclick="checkAPIConfig()">检查配置</button>
            <div id="config-result"></div>
        </div>
        
        <!-- Test 2: Network Connectivity -->
        <div class="test-section">
            <h2>2️⃣ 网络连接测试</h2>
            <button onclick="testConnectivity()">测试连接</button>
            <div id="connectivity-result"></div>
        </div>
        
        <!-- Test 3: Create Appointment -->
        <div class="test-section">
            <h2>3️⃣ 创建预约测试</h2>
            <button onclick="testCreateAppointment()">测试创建预约</button>
            <div id="appointment-result"></div>
        </div>
        
        <!-- Test 4: Browser Info -->
        <div class="test-section">
            <h2>4️⃣ 浏览器信息</h2>
            <button onclick="showBrowserInfo()">显示信息</button>
            <div id="browser-result"></div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://18.221.125.254:8000';
        const API_VERSION = '/api/v1';
        
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.className = `result ${type}`;
            element.textContent = message;
        }
        
        function checkAPIConfig() {
            const config = {
                'API_BASE_URL': API_BASE_URL,
                'API_VERSION': API_VERSION,
                'Full URL': `${API_BASE_URL}${API_VERSION}`,
                'Browser': navigator.userAgent,
                'Cookies Enabled': navigator.cookieEnabled,
                'Online': navigator.onLine
            };
            
            showResult('config-result', JSON.stringify(config, null, 2), 'info');
        }
        
        async function testConnectivity() {
            showResult('connectivity-result', '正在测试连接...', 'info');
            
            try {
                const startTime = Date.now();
                const response = await fetch(`${API_BASE_URL}${API_VERSION}/health`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                if (response.ok) {
                    const data = await response.json();
                    showResult('connectivity-result', 
                        `✅ 连接成功！\n` +
                        `响应时间: ${duration}ms\n` +
                        `状态码: ${response.status}\n` +
                        `响应数据: ${JSON.stringify(data, null, 2)}`,
                        'success'
                    );
                } else {
                    showResult('connectivity-result', 
                        `❌ 连接失败\n` +
                        `状态码: ${response.status}\n` +
                        `状态文本: ${response.statusText}`,
                        'error'
                    );
                }
            } catch (error) {
                showResult('connectivity-result', 
                    `❌ 连接错误\n${error.message}`,
                    'error'
                );
            }
        }
        
        async function testCreateAppointment() {
            showResult('appointment-result', '正在创建测试预约...', 'info');
            
            // 准备测试数据
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const appointmentDate = tomorrow.toISOString().split('T')[0];
            
            const appointmentData = {
                name: '诊断测试用户',
                email: 'diagnostic@test.com',
                phone: '13800138000',
                appointment_date: appointmentDate,
                time_slot: '14:00',
                service_type: '诊断测试',
                notes: '这是一个诊断测试预约'
            };
            
            try {
                console.log('📤 发送请求:', appointmentData);
                
                const response = await fetch(`${API_BASE_URL}${API_VERSION}/appointments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    },
                    body: JSON.stringify(appointmentData)
                });
                
                console.log('📊 响应状态:', response.status);
                console.log('📊 响应头:', Object.fromEntries(response.headers.entries()));
                
                const responseText = await response.text();
                console.log('📊 响应内容:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    throw new Error(`无法解析响应: ${responseText}`);
                }
                
                if (response.ok) {
                    showResult('appointment-result', 
                        `✅ 预约创建成功！\n\n` +
                        `确认号: ${data.appointment.confirmation_number}\n` +
                        `预约日期: ${data.appointment.appointment_date}\n` +
                        `时间: ${data.appointment.time_slot}\n` +
                        `状态: ${data.appointment.status}\n\n` +
                        `完整响应:\n${JSON.stringify(data, null, 2)}`,
                        'success'
                    );
                } else {
                    showResult('appointment-result', 
                        `❌ 预约创建失败\n\n` +
                        `状态码: ${response.status}\n` +
                        `错误信息: ${data.detail || '未知错误'}\n\n` +
                        `完整响应:\n${JSON.stringify(data, null, 2)}`,
                        'error'
                    );
                }
            } catch (error) {
                console.error('❌ 错误:', error);
                showResult('appointment-result', 
                    `❌ 请求失败\n\n` +
                    `错误类型: ${error.name}\n` +
                    `错误信息: ${error.message}\n\n` +
                    `堆栈跟踪:\n${error.stack}`,
                    'error'
                );
            }
        }
        
        function showBrowserInfo() {
            const info = {
                'User Agent': navigator.userAgent,
                'Platform': navigator.platform,
                'Language': navigator.language,
                'Cookies Enabled': navigator.cookieEnabled,
                'Online': navigator.onLine,
                'Screen Resolution': `${screen.width}x${screen.height}`,
                'Window Size': `${window.innerWidth}x${window.innerHeight}`,
                'Timezone': Intl.DateTimeFormat().resolvedOptions().timeZone,
                'Current Time': new Date().toISOString()
            };
            
            showResult('browser-result', JSON.stringify(info, null, 2), 'info');
        }
        
        // 自动运行配置检查
        window.addEventListener('load', () => {
            checkAPIConfig();
        });
    </script>
</body>
</html>
